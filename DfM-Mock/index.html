<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Dynamics 365 (DfM)</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f3f2f1;
        }

        .case-header {
            background: #fff;
            padding: 15px;
            border-bottom: 1px solid #edebe9;
        }

        .case-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #0078d4;
        }

        .bookmarklet-btn {
            background: #0078d4;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

</head>

<body>
    <div class="case-header">
        <div style="display: grid; grid-template-cols: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <div>
                <label style="font-size: 0.8rem; color: #666;">Case Number:</label><br />
                <input id="caseNumInput" type="text" value=""
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="font-size: 0.8rem; color: #666;">Case Title:</label><br />
                <input id="caseTitleInput" type="text" value="テスト用のお問い合わせについて"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="font-size: 0.8rem; color: #666;">SLA:</label><br />
                <input id="SLAInput" type="text" value=""
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="font-size: 0.8rem; color: #666;">Severity:</label><br />
                <input id="severityInput" type="text" value="B"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="grid-column: span 2;">
                <label style="font-size: 0.8rem; color: #666;">Customer Statement:</label><br />
                <textarea id="custStatementInput"
                    style="width: 100%; height: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">これはテスト用のお問い合わせコンテンツです：　フランスおよびイタリアの首都を教えてください</textarea>
            </div>
            <div>
                <label style="font-size: 0.8rem; color: #666;">Email:</label><br />
                <input id="emailInput" type="text" value="demo.customer@example.com"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="font-size: 0.8rem; color: #666;">Phone:</label><br />
                <input id="phoneNumInput" type="text" value="+81-09012345678"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
        </div>
        <p>This is a dummy DfM page to test the Bookmarklet and communication.</p>
        <button class="bookmarklet-btn" onclick="runBookmarklet()">Run Bookmarklet (Mock)</button>
    </div>

    <script>
        // Randomize Case Number (16-digit) and SLA on page load
        (function initRandom() {
            // 16-digit number: first digit != 0
            const caseNum = String(Math.floor(1 + Math.random() * 9)) +
                Array.from({ length: 15 }, () => Math.floor(Math.random() * 10)).join('');
            document.getElementById('caseNumInput').value = caseNum;

            const r = () => Math.floor(Math.random() * 59) + 1;
            const slaOptions = [
                `${Math.floor(Math.random()*6)+1}d ${Math.floor(Math.random()*23)+1}h ${r()}m ${r()}s`,
                `${Math.floor(Math.random()*23)+1}h ${r()}m ${r()}s`,
                `${r()}m ${r()}s`,
                '',
            ];
            document.getElementById('SLAInput').value = slaOptions[Math.floor(Math.random() * slaOptions.length)];
        })();

        function extractData() {
            const caseNum = document.getElementById('caseNumInput').value;
            const caseTitle = document.getElementById('caseTitleInput').value;
            const SLA = document.getElementById('SLAInput').value;
            const severity = document.getElementById('severityInput').value;
            const custStatement = document.getElementById('custStatementInput').value;
            const email = document.getElementById('emailInput').value;
            const phoneNum = document.getElementById('phoneNumInput').value;
            return {
                caseNum,
                caseTitle,
                SLA,
                severity,
                custStatement,
                email,
                phoneNum,
                sampledAt: new Date().toISOString(),
            };
        }

        function runBookmarklet() {
            const parentDomain = window.location.origin;
            const spaUrl = `http://localhost:5175/DfM-Ninja/#parentDomain=${parentDomain}`;
            const ninjaWindow = window.open(spaUrl, "DfMNinja");

            // Extract data from inputs
            const caseNum = document.getElementById('caseNumInput').value;
            const caseTitle = document.getElementById('caseTitleInput').value;

            const caseData = {
                id: caseNum,
                title: caseTitle,
                extractedAt: new Date().toISOString()
            };

            // Wait for SPA to be ready
            setTimeout(() => {
                ninjaWindow.postMessage({ type: "EXTRACTED_DATA", data: caseData }, spaUrl);
            }, 2000);
        }

        window.addEventListener("message", (event) => {
            // if (event.origin !== "http://localhost:5175") return;
            console.log("Received command from Ninja:", event.data, event.origin);

            // RPC Request Handler for Mock
            if (event.data.type === "RPC_REQUEST") {
                const { functionStr, timestamp, args } = event.data;
                try {
                    if (functionStr.match(/headerBodyContainer/)) {
                        console.log("headerBodyContainer");

                        const result = extractData();
                        event.source.postMessage({
                            type: "RPC_RESPONSE",
                            timestamp: timestamp,
                            data: result
                        }, event.origin);
                        return;
                    }

                    const executor = eval('(' + functionStr + ')');
                    // 万が一 args が無い時も空の配列として扱う
                    const result = executor(...(args || []));
                    event.source.postMessage({
                        type: "RPC_RESPONSE",
                        timestamp: timestamp,
                        data: result
                    }, event.origin);
                } catch (e) {
                    event.source.postMessage({
                        type: "RPC_RESPONSE",
                        timestamp: timestamp,
                        error: e.message
                    }, event.origin);
                }
                return;
            }

            if (event.data.type === "PING") {
                event.source.postMessage({ type: "PONG" }, event.origin);
            }
        });
    </script>
</body>

</html>
