<% const uid=new Date().getTime(); %>
<div id="MP_AddAsk_step1-<%=uid%>" class="bg-emerald-50 p-6 rounded-xl border border-emerald-100 shadow-inner relative">

    <!-- Action Buttons -->
    <div class="absolute top-4 right-6 flex gap-1.5 focus-within:ring-0">
        <button title="リセット"
            class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-90 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">🔄</button>
        <button title="レンダリング"
            class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-95 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">⚡️</button>
    </div>

    <!-- Main Grid -->
    <div class="grid grid-cols-2 gap-8 mt-6">
        <!-- Left Column -->
        <div class="flex flex-col gap-4">
            <!-- 追加質問内容 -->
            <div class="flex flex-col">
                <div class="flex items-center justify-between mb-2 px-1">
                    <h4 class="text-[13px] font-bold text-emerald-900 tracking-wider">追加質問内容</h4>
                </div>
                <textarea name="askContent" data-doubleclick="copy"
                    class="w-full h-[120px] p-3 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                    placeholder="追加で確認したい内容を入力してください..."></textarea>
            </div>

            <!-- Prompt -->
            <div class="flex flex-col h-full">
                <div class="flex items-center mb-2 px-1">
                    <h4 class="text-[13px] font-black text-emerald-900 tracking-wider">Prompt</h4>
                </div>
                <textarea name="askPrompt" data-doubleclick="copy"
                    class="w-full flex-1 min-h-[350px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                    placeholder="Prompt goes here..."></textarea>
            </div>
        </div>

        <!-- Right Column -->
        <div class="flex flex-col gap-5">
            <!-- Field 1: お客様が困った点 -->
            <div class="flex flex-col">
                <h4 class="text-[13px] font-bold text-emerald-900 mb-2 px-1">お客様が困った点</h4>
                <textarea name="custTrouble"
                    class="w-full h-[120px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                    placeholder="お客様が何に困っているか..."></textarea>
            </div>

            <!-- Field 2: 回答方針 -->
            <div class="flex flex-col">
                <h4 class="text-[13px] font-bold text-emerald-900 mb-2 px-1">回答方針</h4>
                <textarea name="answerPolicy"
                    class="w-full h-[120px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                    placeholder="どのように回答するかの方針..."></textarea>
            </div>

            <!-- Field 3: 追加質問回答 -->
            <div class="flex flex-col flex-1">
                <h4 class="text-[13px] font-bold text-emerald-900 mb-2 px-1">追加質問回答 <span class="text-[11px] font-normal text-emerald-700/70">(空の場合、QuickAckとなる)</span></h4>
                <div name="askResult" data-doubleclick="copy" contenteditable="true"
                    class="w-full h-full min-h-[180px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all overflow-y-auto whitespace-pre-wrap outline-none"
                    placeholder="生成された回答内容..."></div>
            </div>
        </div>
    </div>

    <!-- Placeholders for noscript -->
    <noscript data-name="askContent"></noscript>
    
    <noscript data-name="askPrompt">
        # 指示
        お客様から追加のお問い合わせ内容と、担当者が作成した修正前の回答本文を分析し、以下のフォーマットに従って「お客様が困った点」「回答方針」「修正後の回答本文」を作成してください。

        # 重要
        - 各項目ごとに、**それぞれ独立した単一のコードブロック（```text 〜 ```）で囲んだプレーンテキスト**として出力してください。
        - 「お客様が困った点」と「回答方針」はチーム内のレビュー用ですので、**挨拶や丁寧な言い回しを省略し、なるべく簡潔に**記載してください。
        - 「修正後の回答本文」は以下のルールに従って修正・推敲してください：
          - 半角英数字の前後に半角スペースを入れる
          - お客様名が統一されていること
          - 挨拶は不要（後で定型文を追加するため）
          - 感情表現は不要、ただしお客様を追及するようなニュアンスは避けること
          - ケースと関連しない個人情報等は含まれないこと
          - お客様の文脈を常に考慮すること


        # 出力フォーマット
        お客様が困った点：
        ```text
        (お問い合わせ内容から、お客様が何に困っているかを簡潔に要約)
        ```

        回答方針：
        ```text
        (修正前の回答本文をもとに、どのような方針で回答・解決しようとしているかを簡潔に要約)
        ```

        修正後の回答本文：
        ```text
        (上記のルールに従って修正・推敲した回答本文)
        ```


        # 入力データ
        【追加のお問い合わせ内容】
        ```text
        {{askContent}}
        ```
        
        【修正前の回答本文】(修正前回答本文をここに貼り付けてください)
        ```text
        
        
        
        ```
    </noscript>

    <noscript data-name="askResult"></noscript>

    <script>
        (function () {
            const divId = '#MP_AddAsk_step1-<%=uid%>';
            const $scope = $(divId);
            const $askContent = $scope.find('textarea[name="askContent"]');
            const $askPrompt = $scope.find('textarea[name="askPrompt"]');
            const $custTrouble = $scope.find('textarea[name="custTrouble"]');
            const $answerPolicy = $scope.find('textarea[name="answerPolicy"]');
            const $askResult = $scope.find('[name="askResult"]');

            const askContentText = $scope.find('noscript[data-name="askContent"]').text().trim().replace(/\n +/g, '\n');
            const askPromptText = $scope.find('noscript[data-name="askPrompt"]').text().trim().replace(/\n +/g, '\n');
            const askResultText = $scope.find('noscript[data-name="askResult"]').text().trim().replace(/\n +/g, '\n');

            const caseDataInitial = window.currentCase;
            const activeStepInitial = caseDataInitial?.activeStep;

            // Load initial values
            if (activeStepInitial && activeStepInitial.askContent) {
                $askContent.val(activeStepInitial.askContent);
            } else if (caseDataInitial) {
                $askContent.val(askContentText);
            }

            if (activeStepInitial && activeStepInitial.askPrompt) {
                $askPrompt.val(activeStepInitial.askPrompt);
            } else if (caseDataInitial) {
                $askPrompt.val(caseDataInitial.render(askPromptText));
            }

            if (activeStepInitial && activeStepInitial.custTrouble) {
                $custTrouble.val(activeStepInitial.custTrouble);
            }
            if (activeStepInitial && activeStepInitial.answerPolicy) {
                $answerPolicy.val(activeStepInitial.answerPolicy);
            }

            if (activeStepInitial && activeStepInitial.askResult) {
                if ($askResult.is('textarea, input')) $askResult.val(activeStepInitial.askResult);
                else $askResult.html(activeStepInitial.askResult);
            } else if (caseDataInitial) {
                if ($askResult.is('textarea, input')) $askResult.val(askResultText);
                else $askResult.html(askResultText);
            }

            // Rendering Logic
            $scope.find('button[title="レンダリング"]').off('click').on('click', function () {
                const caseData = window.currentCase;
                if (!caseData) return;

                // 1. レンダリングボタンを押した瞬間の askContent を activeStep に一時保存して render 内で解決できるようにする
                if (caseData.activeStep) {
                    caseData.activeStep.askContent = $askContent.val();
                }

                const promptVal = $askPrompt.val();
                const resultVal = $askResult.is('textarea, input') ? $askResult.val() : $askResult.html();

                // 2. 他のテンプレート変数 ({{caseNum}}等) と、1で設定した {{askContent}} を同時に解決
                $askPrompt.val(caseData.render(promptVal));
                
                const renderedResult = caseData.render(resultVal);
                if ($askResult.is('textarea, input')) $askResult.val(renderedResult);
                else $askResult.html(renderedResult);
            });

            $scope.find('button[title="リセット"]').off('click').on('click', function () {
                if (!confirm('リセットしますか？')) return;
                $askContent.val(askContentText);
                $askPrompt.val(window.currentCase ? window.currentCase.render(askPromptText) : askPromptText);
                $custTrouble.val('');
                $answerPolicy.val('');
                $askResult.is('textarea, input') ? $askResult.val(askResultText) : $askResult.html(askResultText);
            });

            // Auto-save sync
            $scope.find('textarea, [contenteditable]').on('input blur', function() {
                const caseData = window.currentCase;
                if (!caseData || !caseData.activeStep) return;

                caseData.activeStep.askContent = $askContent.val();
                caseData.activeStep.askPrompt = $askPrompt.val();
                caseData.activeStep.custTrouble = $custTrouble.val();
                caseData.activeStep.answerPolicy = $answerPolicy.val();
                caseData.activeStep.askResult = $askResult.is('textarea, input') ? $askResult.val() : $askResult.html();
            });
        })();
    </script>
</div>
