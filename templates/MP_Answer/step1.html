<% const uid=new Date().getTime(); %>
    <div id="MP_Answer_step1-<%=uid%>" class="bg-emerald-50 p-6 rounded-xl border border-emerald-100 shadow-inner">
        <div class="grid grid-cols-2 gap-6">
            <div class="flex flex-col">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">Prompt</h4>
                    <div class="flex gap-1.5 focus-within:ring-0">
                        <button title="リセット"
                            class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-90 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">🔄</button>
                        <button title="レンダリング"
                            class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-95 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">⚡️</button>
                    </div>
                </div>
                <textarea name="prompt" data-doubleclick="copy"
                    class="w-full h-[320px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                    placeholder="Prompt goes here..."></textarea>
            </div>
            <div class="flex flex-col">
                <div class="flex items-center justify-between mt-3 mb-3 px-1">
                    <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">回答文面</h4>
                </div>
                <div name="answerText" data-doubleclick="copy" contenteditable="true"
                    class="w-full h-[320px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all overflow-y-auto whitespace-pre-wrap outline-none"
                    placeholder=" ... "></div>
            </div>
        </div>
        <noscript data-name="prompt">
            現在のお問い合わせ内容は以下です。
            ```
            {{custStatement}}
            ```

            上記質問の回答として、下記の回答文の表現が不適切な箇所を修正し、読みやすいように修正してください。
            また、文面をPlain Textにし、Code Blockの中に出力してください。

            - 半角英数字の前後に半角スペースはある
            - お客様名が統一している
            - 挨拶は不要（定型文あり）
            - 感情表現は不要、ただしお客様を追及しようとする感覚はしないこと
            - ケースと関連しない個人情報等は含まれていない
            - お客様の文脈を考慮して回答する

            回答本文：
            ```



            ```
        </noscript>
        <script>
            (function () {
                const divId = '#MP_Answer_step1-<%=uid%>';
                const $scope = $(divId); // このステップの範囲内だけで探す
                const $prompt = $scope.find('textarea[name="prompt"]');
                const $answerText = $scope.find('[name="answerText"]');
                const promptText = $scope.find('noscript[data-name="prompt"]').text().trim().replace(/\n +/g, '\n');

                {
                    const caseDataInitial = window.currentCase;
                    const activeStepInitial = caseDataInitial?.activeStep;

                    if (activeStepInitial && activeStepInitial.prompt) {
                        $prompt.val(activeStepInitial.prompt);
                    } else if (caseDataInitial) {
                        const renderedPrompt = caseDataInitial.render(promptText);
                        $prompt.val(renderedPrompt);
                    }
                    if (activeStepInitial && activeStepInitial.answerText) {
                        if ($answerText.is('textarea, input')) {
                            $answerText.val(activeStepInitial.answerText);
                        } else {
                            $answerText.html(activeStepInitial.answerText);
                        }
                    }
                }

                // .on ではなく、直接要素に .click 等でバインドする
                $scope.find('button[title="レンダリング"]').off('click').on('click', function () {
                    const caseData = window.currentCase;
                    if (!caseData) return;
                    
                    const promptTextVal = $scope.find('textarea[name="prompt"]').val();
                    const answerTextText = $answerText.is('textarea, input') ? $answerText.val() : $answerText.html();

                    const renderedPrompt = caseData.render(promptTextVal);
                    $prompt.val(renderedPrompt);

                    console.log('prompt', renderedPrompt, 'answerText', answerTextText);
                });

                $scope.find('button[title="リセット"]').off('click').on('click', function () {
                    if (!confirm('リセットしますか？')) {
                        return;
                    }

                    // リセットしたら、手動でレンダリング
                    $scope.find('textarea[name="prompt"]').val(promptText);
                    // $answerText.val(''); or .html('');
                });
            })();
        </script>

    </div>
