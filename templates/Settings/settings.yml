Holidays: # 社内休業日リスト
  # 書き方は3種類：
  #
  #   1. "YYYY/MM/DD"  絶対年指定（その年のみ有効）
  #      例: "2025/12/28"  -- 2025年のみ有効な特別休業日
  #
  #   2. "+0/MM/DD"   今年起算の相対指定（+0 = 今年）
  #      例: "+0/12/29"   -- 毎年 今年の12月29日
  #
  #   3. "+N/MM/DD"   N年後起算（+1 = 翌年, +2 = 翌々年, 最大+9）
  #      例: "+1/01/01"   -- 毎年 翌年の1月1日（年末年始の年またぎ用）
  #
  # ★★★ 大型連休の運用ルール ★★★
  #
  #   「大型連休 10日前通知（isNearHoliday）」機能は、
  #   このリストで連続する日付の塊（クラスター）を自動検出します。
  #   週末の自動補完は行わないため、
  #   大型連休に含まれる週末・祝日も含め、すべての日付を明示的に記載してください。
  #
  #   例：年末年始が「12/27(土)〜1/4(日)」の場合
  #     → "+0/12/27", "+0/12/28", "+0/12/29", ..., "+1/01/04" を全部列挙する
  #
  # ---- 年末年始の設定例 ----
  - "+0/12/29"  # 今年 12月29日
  - "+0/12/30"  # 今年 12月30日
  - "+0/12/31"  # 今年 12月31日
  - "+1/01/01"  # 翌年 1月1日（元日）
  - "+1/01/02"  # 翌年 1月2日
  - "+1/01/03"  # 翌年 1月3日
  # ---- 年またぎの特別対応 例 ----
  # - "2025/12/28"  # 2025年限定の特別休業日（絶対年指定）
