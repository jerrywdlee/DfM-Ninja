<% const uid=new Date().getTime(); %>
    <div id="MP_Strike3_step3-<%=uid%>" class="bg-emerald-50 p-6 rounded-xl border border-emerald-100 shadow-inner relative">

        <!-- Action Buttons -->
        <div class="absolute top-4 right-6 flex gap-1.5 focus-within:ring-0">
            <button title="リセット"
                class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-90 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm text-slate-600">🔄</button>
            <button title="レンダリング"
                class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-95 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm text-yellow-500">⚡️</button>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-[1fr_300px] gap-8 mt-6">

            <!-- Left Side: Email Body -->
            <div class="flex flex-col min-w-0">
                <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80 mb-2">Email 本文</h4>
                <div name="emailBodyFinal" data-doubleclick="copy" contenteditable="true"
                    class="w-full h-[320px] p-4 text-[12px] border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all overflow-y-auto whitespace-pre-wrap outline-none break-all"
                    placeholder="FoooBarFoooBarFoooBar..."></div>
            </div>

            <!-- Right Side: Actions & CC -->
            <div class="flex flex-col gap-6 pt-8">

                <div class="flex flex-wrap gap-2.5">
                    <button title="Highlight Case TTL Num"
                        class="whitespace-nowrap py-2 px-3 bg-pink-100/50 hover:bg-pink-200/50 text-slate-800 font-bold text-sm border border-pink-200 rounded-lg shadow-sm transition-all active:scale-95 flex items-center justify-center gap-1">
                        💡 TTL Num
                    </button>
                    <button title="Highlight To CC List"
                        class="whitespace-nowrap py-2 px-3 bg-pink-100/50 hover:bg-pink-200/50 text-slate-800 font-bold text-sm border border-pink-200 rounded-lg shadow-sm transition-all active:scale-95 flex items-center justify-center gap-1">
                        💡 To CC
                    </button>
                    <button title="Auto Checkbox"
                        class="whitespace-nowrap py-2 px-3 bg-pink-100/50 hover:bg-pink-200/50 text-slate-800 font-bold text-sm border border-pink-200 rounded-lg shadow-sm transition-all active:scale-95 flex items-center justify-center gap-1">
                        Auto ✅
                    </button>
                </div>

                <div class="flex flex-col">
                    <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80 mb-2">DfM CC:</h4>
                    <input type="text" name="dfmCc" data-doubleclick="copy"
                        class="w-full p-3 text-xs font-mono border border-emerald-200 rounded-lg bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all"
                        placeholder="FoooBarFoooBarFoooBar" />
                </div>
                <div class="flex flex-col mt-4">
                    <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80 mb-2">Current Action:</h4>
                    <select name="currentAction"
                        class="w-full p-2.5 text-xs font-mono border border-emerald-200 rounded-lg bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all cursor-pointer">
                        <option value="Troubleshooting">Troubleshooting</option>
                        <option value="Pending customer information">Pending customer information</option>
                        <option value="Waiting TL">Waiting TL</option>
                        <option value="Ready to close" selected>Ready to close</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Bottom: Internal Title -->
        <div class="mt-6">
            <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80 mb-2">Internal Title:</h4>
            <input type="text" name="internalTitle" data-doubleclick="copy"
                class="w-full p-3 text-xs font-mono border border-emerald-200 rounded-lg bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all"
                placeholder="FoooBarFoooBarFoooBar" />
        </div>

        <dialog id="MP_Strike3_step3-<%=uid%>-dialog" class="m-auto p-0 rounded-2xl shadow-xl border border-emerald-200 backdrop:bg-slate-800/40 w-[420px] max-w-full focus:outline-none overflow-hidden text-slate-700">
            <!-- Header -->
            <div class="dialog-header flex justify-between items-center px-5 py-3 bg-emerald-100/80 border-b border-emerald-200">
                <span class="title font-bold text-sm text-emerald-900 tracking-wider"></span>
                <form method="dialog">
                    <button class="text-emerald-700 hover:text-emerald-900 hover:bg-emerald-200/50 p-1 rounded-lg transition-colors flex items-center justify-center focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </form>
            </div>
            <!-- Content -->
            <div class="dialog-content flex flex-col gap-4 p-5 bg-emerald-50/30" id="MP_Strike3_step3-<%=uid%>-dialog-content">
                <!-- injected via JS -->
            </div>
        </dialog>

        <noscript data-name="emailBodyText">
            {{emailBody}}
        </noscript>
        <noscript data-name="dfmCcText">
            {{dfmCc}}
        </noscript>
        <noscript data-name="internalTitleText">
            {{Status}}{{nextNC_XS}}/4/{{Lic_S}}/{{TeamName}} | {{Actor}} | Green | PI: N/A | SE: {{currentNC_L}} | {{currentAction}} | <Ready to Close>
        </noscript>

        <script>
            (function () {
                const divId = '#MP_Strike3_step3-<%=uid%>';
                const $scope = $(divId);
                const $emailBody = $scope.find('[name="emailBodyFinal"]');
                const $dfmCc = $scope.find('input[name="dfmCc"]');
                const $internalTitle = $scope.find('input[name="internalTitle"]');
                const $currentAction = $scope.find('select[name="currentAction"]');

                const caseDataInitial = window.currentCase;
                const autoLink = window.autoLinkUrls || ((text) => text);
                const activeStepInitial = caseDataInitial?.activeStep;

                const emailBodyText = $scope.find('noscript[data-name="emailBodyText"]').text().trim().replace(/\\n +/g, '\\n') || '';
                const dfmCcText = $scope.find('noscript[data-name="dfmCcText"]').text().trim() || '';
                const internalTitleText = $scope.find('noscript[data-name="internalTitleText"]').text().trim() || '';

                if (activeStepInitial) {
                    if (activeStepInitial.emailBodyFinal) {
                        if ($emailBody.is('textarea, input')) $emailBody.val(activeStepInitial.emailBodyFinal);
                        else $emailBody.html(autoLink(activeStepInitial.emailBodyFinal));
                    } else if (caseDataInitial) {
                        const rendered = caseDataInitial.render(emailBodyText);
                        if ($emailBody.is('textarea, input')) $emailBody.val(rendered);
                        else $emailBody.html(autoLink(rendered));
                    }

                    if (activeStepInitial.dfmCc) $dfmCc.val(activeStepInitial.dfmCc);
                    else if (caseDataInitial) $dfmCc.val(caseDataInitial.render(dfmCcText));

                    if (activeStepInitial.internalTitle) $internalTitle.val(activeStepInitial.internalTitle);
                    else if (caseDataInitial) $internalTitle.val(caseDataInitial.render(internalTitleText).trim());

                    if (activeStepInitial.currentAction) $currentAction.val(activeStepInitial.currentAction);
                }

                $scope.find('button[title="リセット"]').off('click').on('click', function () {
                    if (!confirm('リセットしますか？')) return;
                    if ($emailBody.is('textarea, input')) $emailBody.val(emailBodyText);
                    else $emailBody.html(autoLink(emailBodyText));
                    $dfmCc.val(dfmCcText);
                    $internalTitle.val(internalTitleText);
                    $currentAction.val('Ready to close');
                });

                $scope.find('button[title="レンダリング"]').off('click').on('click', function () {
                    const caseData = window.currentCase;
                    if (!caseData) return;
                    if (caseData.activeStep) caseData.activeStep.currentAction = $currentAction.val();

                    const currentBody = $emailBody.is('textarea, input') ? $emailBody.val() : $emailBody.html();
                    const rendered = caseData.render(currentBody);
                    if ($emailBody.is('textarea, input')) $emailBody.val(rendered);
                    else $emailBody.html(autoLink(rendered));

                    $dfmCc.val(caseData.render($dfmCc.val()));
                    $internalTitle.val(caseData.render($internalTitle.val()).trim());
                });

                // Dummy actions for now
                $scope.find('button[title="Highlight Case TTL Num"]').off('click').on('click', function () {
                    const caseData = window.currentCase;
                    if (!caseData) return;
                    if (window.execDfM && window.dfmScripts) {
                        const keywords = [caseData.caseNum, caseData.caseTitle].filter(Boolean);
                        window.execDfM(window.dfmScripts.highlightKeywords, keywords)
                            .then(() => window.showToast('Highlighted Case TTL Num', 'info'))
                            .catch(e => window.showToast('Highlight Case TTL Num failed', 'error'));
                    }
                });

                $scope.find('button[title="Highlight To CC List"]').off('click').on('click', function () {
                    const caseData = window.currentCase;
                    const dialogId = '#MP_Strike3_step3-<%=uid%>-dialog';
                    const dialog = $(dialogId)[0];
                    const $dialogContent = $scope.find('.dialog-content');
                    const btnTitle = $(this).attr('title') || 'Mailing List';
                    
                    $(dialog).find('.dialog-header .title').text(btnTitle);

                    if (!caseData) return;

                    let html = '';
                    
                    // To
                    html += `
                        <div class="flex flex-col gap-1.5 mt-0">
                            <span class="text-[11px] font-black text-emerald-800 tracking-widest opacity-80 pl-1">To:</span>
                            <div class="m-0">
                                <input type="text" readonly data-doubleclick="copy" value="${caseData.email || '--'}"
                                    class="w-full p-2.5 text-xs font-mono border border-emerald-200 rounded-lg bg-emerald-50/50 shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all text-slate-700 ${!caseData.email ? 'opacity-50' : 'cursor-copy'}" />
                            </div>
                        </div>
                    `;

                    // CC
                    const ccList = (caseData.emailCcList || []).map(s => s.trim()).filter(Boolean);
                    html += `
                        <div class="flex flex-col gap-1.5 mt-2">
                            <span class="text-[11px] font-black text-emerald-800 tracking-widest opacity-80 pl-1">CC:</span>
                    `;
                    
                    if (ccList.length > 0) {
                        html += '<div class="flex flex-col gap-2">';
                        ccList.forEach(cc => {
                            html += `
                                <div class="m-0">
                                    <input type="text" readonly data-doubleclick="copy" value="${cc}"
                                        class="w-full p-2.5 text-xs font-mono border border-emerald-200 rounded-lg bg-emerald-50/50 shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all text-slate-700 cursor-copy" />
                                </div>
                            `;
                        });
                        html += '</div>';
                    } else {
                        html += `
                            <div class="m-0">
                                <input type="text" disabled value="--" class="w-full p-2.5 text-xs font-mono border border-emerald-200 rounded-lg bg-slate-50 shadow-sm focus:outline-none transition-all text-slate-400 opacity-50 cursor-not-allowed" />
                            </div>
                        `;
                    }
                    html += `</div>`;

                    $dialogContent.html(html);

                    dialog.showModal();

                    if (window.execDfM && window.dfmScripts) {
                        const toCcList = [...ccList];
                        if (caseData.email) toCcList.push(caseData.email);
                        window.execDfM(window.dfmScripts.highlightKeywords, toCcList)
                            .then(() => window.showToast('Highlighted To CC List', 'info'))
                            .catch(e => window.showToast('Highlight To CC List failed', 'error'));
                    }
                });

                $scope.find('button[title="Auto Checkbox"]').off('click').on('click', function () {
                    if (window.execDfM && window.dfmScripts) {
                        window.execDfM(window.dfmScripts.autoCheckbox)
                            .then(() => window.showToast('Auto Checkbox clicked', 'info'))
                            .catch(e => window.showToast('Auto Checkbox failed', 'error'));
                    }
                });

            })();
        </script>
    </div>
