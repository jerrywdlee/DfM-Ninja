<% const uid=new Date().getTime(); %>
    <div id="MP_Strike3_step2-<%=uid%>"
        class="bg-emerald-50 p-6 rounded-xl border border-emerald-100 shadow-inner relative">

        <!-- Action Buttons -->
        <div class="absolute top-4 right-6 flex gap-1.5 focus-within:ring-0">
            <button title="リセット"
                class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-90 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">🔄</button>
            <button title="レンダリング"
                class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-95 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">⚡️</button>
            <button title="メール文面コピー"
                class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-95 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">✉️</button>
            <button title="メール送信"
                class="text-xs hover:bg-emerald-200/50 p-1.5 rounded-lg transition-all active:scale-95 flex items-center justify-center bg-white/50 border border-emerald-200/50 shadow-sm">📬</button>
        </div>

        <!-- Main Grid -->
        <div class="grid grid-cols-2 gap-6 mt-6">
            <!-- Left Column -->
            <div class="flex flex-col gap-4">
                <!-- Email Head -->
                <div class="flex flex-col">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">Email Head</h4>
                    </div>
                    <textarea name="emailHead" data-doubleclick="copy"
                        class="w-full h-[120px] p-3 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                        placeholder="宛先やご挨拶など..."></textarea>
                </div>

                <!-- Email 本文 -->
                <div class="flex flex-col flex-1">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">Email 本文</h4>
                    </div>
                    <textarea name="emailBody" data-doubleclick="copy"
                        class="w-full h-[240px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                        placeholder="メール本文..."></textarea>
                </div>
            </div>

            <!-- Right Column -->
            <div class="flex flex-col gap-4">
                <!-- To -->
                <div class="flex flex-col">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">To:</h4>
                    </div>
                    <input type="text" name="emailTo" data-doubleclick="copy"
                        class="w-full p-3 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all focus:bg-white"
                        placeholder="To..." />
                </div>

                <!-- CC -->
                <div class="flex flex-col">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">CC:</h4>
                    </div>
                    <input type="text" name="emailCc" data-doubleclick="copy"
                        class="w-full p-3 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all focus:bg-white"
                        placeholder="CC..." />
                </div>

                <!-- 件名 -->
                <div class="flex flex-col">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">件名:</h4>
                    </div>
                    <input type="text" name="emailSubject" data-doubleclick="copy"
                        class="w-full p-3 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all focus:bg-white"
                        placeholder="件名..." />
                </div>

                <!-- レビュー要請 -->
                <div class="flex flex-col flex-1">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h4 class="text-[12px] font-black text-emerald-800 tracking-widest opacity-80">レビュー要請:</h4>
                    </div>
                    <textarea name="reviewRequest" data-doubleclick="copy"
                        class="h-full w-full min-h-[120px] p-4 text-xs font-mono border border-emerald-200 rounded-xl bg-white shadow-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all resize-none"
                        placeholder="レビュー担当者への依頼文..."></textarea>
                </div>
            </div>
        </div>

        <noscript data-name="emailSubject">
            [TL review][MP][{{Lic_L}}] {{caseNum}} {{caseTitle}}
        </noscript>

        <noscript data-name="emailHead">
            {{mailToNames}}

            お疲れ様です、 {{familyName}} です。

            TL review をお願いいたします。
            Closeメール（{{closeType_Str}}）です。{%= !isSendAtSameAsNC ? '（予定送信日: {{sendAt_S}}）' : '' %}
            
            [対応履歴]
            {{stageLog_Dot}}

            [お問い合わせ番号]
            {{caseNum}}

            [タイトル]
            {{caseTitle}}

            [お問い合わせ内容]
            {{custStatement}}
        </noscript>

        <noscript data-name="emailBody">
            ご担当者 様
            
            いつも大変お世話になっております。
            {{CompanyName}} の {{nameWithKana}} です。
            
            本メールにつきましては以下の件についてのご連絡になります。
            
            [お問い合わせ番号]
            {{caseNum}}
            
            [タイトル]
            {{caseTitle}}


            {%_ switch (closeType) {
              case 'customerApprove': -%}
            ご連絡いただきありがとうございます。

            また、本件のクローズをご承諾いただきありがとうございました。

            つきましては、本メールをもちまして対応を終了とさせていただきます。

            この度は弊社サポートをご利用いただき誠にありがとうございました。
            {%_   break;
              case 'mistakenTicket': -%}

            掲題の件につきまして、誤起票と伺いましたので、恐縮ではございますが、
            一旦弊社対応を終了とさせていただきます。  
             
            本件は本メールをもって対応を終了とさせていただきますが、 
            追加のご質問や何かご不明点やご質問等ある場合には些細な事でも構いませんので、
            新規起票頂ければ調査、ご支援が可能でございますので、
            ご遠慮なくご連絡を頂けますと幸いです。  
             
            また、本件に限らず、お困りのことやご不明点等ございましたら、 
            お気兼ねなくお問い合わせいただけますと幸いです。 
             
            サポート一同、お客様のビジネスに貢献できるよう尽力して参ります。  
             
            この度は弊社サポートをご利用いただき誠にありがとうございました。
            {%_   break;
              default: -%}
            掲題の件につきまして、これまでにご返信を頂戴しておりませんため、
            誠に恐縮ではございますが、本メールをもちまして弊社での対応を終了とさせていただきます。

            なお、本件に関しまして追加のご質問やご不明点等ございましたら、
            些細な事でも構いませんので、新規にお問い合わせをいただければ、改めて調査・ご支援させていただきます。
            どうぞご遠慮なくご連絡ください。

            また、本件に限らず、お困りのことやご相談事項がございましたら、
            いつでもお気軽にお問い合わせいただけますと幸いです。
            弊社サポートチーム一同、お客様のビジネスに貢献できるよう、引き続き尽力してまいります。

            今後とも貴社のお役に立てるよう全力を尽くしてまいりますので、何卒よろしくお願い申し上げます。
            この度は弊社サポートをご利用いただき誠にありがとうございました。
            {%_ } -%}

            [フィードバックに関するご案内]
            Microsoft はお客様のフィードバックを大切にしています。
            このやり取りの後、終了の確認メールが別途送付されます。
            こちらのメールからご意見をお寄せいただけますと幸いです。
            
            {{footerNormal}}
        </noscript>

        <noscript data-name="emailTo">
            {{mailTo}}
        </noscript>

        <noscript data-name="emailCc">
            {{mailCc}}
        </noscript>

        <noscript data-name="reviewRequest">
            @ さん、お疲れ様です。
            TL review をお願いします。
            [{{Lic_L}}] {{caseNum}} {{caseTitle}}
            Closeメール（{{closeType_Str}}）です。{%= !isSendAtSameAsNC ? '（予定送信日: {{sendAt_S}}）' : '' %}
        </noscript>

        <script>
            (function () {
                const divId = '#MP_Strike3_step2-<%=uid%>';
                const $scope = $(divId); // このステップの範囲内だけで探す
                const $emailHead = $scope.find('textarea[name="emailHead"]');
                const $emailBody = $scope.find('textarea[name="emailBody"]');
                const $emailTo = $scope.find('input[name="emailTo"]');
                const $emailCc = $scope.find('input[name="emailCc"]');
                const $emailSubject = $scope.find('input[name="emailSubject"]');
                const $reviewRequest = $scope.find('textarea[name="reviewRequest"]');

                const templateId = 'MP_Strike3';
                const getRawText = (name) => {
                    const defaultText = $scope.find(`noscript[data-name="${name}"]`).text().trim().replace(/\n[ |\t]+/g, '\n') || '';
                    return window.getTemplateText ? window.getTemplateText(templateId, name, defaultText) : defaultText;
                };

                const emailHeadText = getRawText('emailHead');
                const emailBodyText = getRawText('emailBody');
                const emailSubjectText = getRawText('emailSubject');
                const emailToText = getRawText('emailTo');
                const emailCcText = getRawText('emailCc');
                const reviewRequestText = getRawText('reviewRequest');

                const caseDataInitial = window.currentCase;
                const activeStepInitial = caseDataInitial?.activeStep;

                if (activeStepInitial && activeStepInitial.emailHead) {
                    $emailHead.val(activeStepInitial.emailHead);
                } else if (caseDataInitial) {
                    const renderedEmailHead = caseDataInitial.render(emailHeadText);
                    $emailHead.val(renderedEmailHead);
                }
                if (activeStepInitial && activeStepInitial.emailBody) {
                    $emailBody.val(activeStepInitial.emailBody);
                } else if (caseDataInitial) {
                    const renderedEmailBody = caseDataInitial.render(emailBodyText);
                    $emailBody.val(renderedEmailBody);
                }
                if (activeStepInitial && activeStepInitial.emailTo) {
                    $emailTo.val(activeStepInitial.emailTo);
                } else if (caseDataInitial) {
                    const renderedEmailTo = caseDataInitial.render(emailToText);
                    $emailTo.val(renderedEmailTo);
                }
                if (activeStepInitial && activeStepInitial.emailCc) {
                    $emailCc.val(activeStepInitial.emailCc);
                } else if (caseDataInitial) {
                    const renderedEmailCc = caseDataInitial.render(emailCcText);
                    $emailCc.val(renderedEmailCc);
                }
                if (activeStepInitial && activeStepInitial.emailSubject) {
                    $emailSubject.val(activeStepInitial.emailSubject);
                } else if (caseDataInitial) {
                    const renderedEmailSubject = caseDataInitial.render(emailSubjectText);
                    $emailSubject.val(renderedEmailSubject);
                }
                if (activeStepInitial && activeStepInitial.reviewRequest) {
                    $reviewRequest.val(activeStepInitial.reviewRequest);
                } else if (caseDataInitial) {
                    const renderedReviewRequest = caseDataInitial.render(reviewRequestText);
                    $reviewRequest.val(renderedReviewRequest);
                }

                // .on ではなく、直接要素に .click 等でバインドする
                $scope.find('button[title="レンダリング"]').off('click').on('click', function () {
                    const caseData = window.currentCase;
                    if (!caseData) return;
                    const headVal = $scope.find('textarea[name="emailHead"]').val();
                    const bodyVal = $scope.find('textarea[name="emailBody"]').val();
                    const subjectVal = $scope.find('input[name="emailSubject"]').val();
                    const reviewVal = $scope.find('textarea[name="reviewRequest"]').val();

                    const renderedEmailHead = caseData.render(headVal);
                    const renderedEmailBody = caseData.render(bodyVal);
                    const renderedEmailSubject = caseData.render(subjectVal);
                    const renderedReviewRequest = caseData.render(reviewVal);
                    const renderedEmailTo = caseData.render(emailToText);
                    const renderedEmailCc = caseData.render(emailCcText);

                    $emailHead.val(renderedEmailHead);
                    $emailBody.val(renderedEmailBody);
                    $emailSubject.val(renderedEmailSubject);
                    $reviewRequest.val(renderedReviewRequest);
                    $emailTo.val(renderedEmailTo);
                    $emailCc.val(renderedEmailCc);

                    console.log('emailHead', renderedEmailHead, 'emailBody', renderedEmailBody, 'emailSubject', renderedEmailSubject, 'reviewRequest', renderedReviewRequest);
                });

                $scope.find('button[title="リセット"]').off('click').on('click', function () {
                    if (!confirm('リセットしますか？')) return;
                    const currentEmailHeadText = getRawText('emailHead');
                    const currentEmailBodyText = getRawText('emailBody');
                    const currentEmailSubjectText = getRawText('emailSubject');
                    const currentReviewRequestText = getRawText('reviewRequest');
                    const currentEmailToText = getRawText('emailTo');
                    const currentEmailCcText = getRawText('emailCc');

                    $scope.find('textarea[name="emailHead"]').val(currentEmailHeadText);
                    $scope.find('textarea[name="emailBody"]').val(currentEmailBodyText);
                    $scope.find('input[name="emailSubject"]').val(currentEmailSubjectText);
                    $scope.find('textarea[name="reviewRequest"]').val(currentReviewRequestText);
                    $scope.find('input[name="emailTo"]').val(currentEmailToText);
                    $scope.find('input[name="emailCc"]').val(currentEmailCcText);
                });

                $scope.find('button[title="メール文面コピー"]').off('click').on('click', async function () {
                    const cleanHtml = (html) => {
                        return html.replace(/<br\s*\/?>/gi, '\n')
                                   .replace(/<div[^>]*>/gi, '\n')
                                   .replace(/<\/div>/gi, '')
                                   .replace(/<p[^>]*>/gi, '\n')
                                   .replace(/<\/p>/gi, '')
                                   .replace(/&nbsp;/gi, ' ')
                                   .trim();
                    };

                    const emailHeadContent = $emailHead.is('textarea, input') ? $emailHead.val() : cleanHtml($emailHead.html());
                    const emailBodyContent = $emailBody.is('textarea, input') ? $emailBody.val() : cleanHtml($emailBody.html());

                    const separator = '\n\n========================================\n\n';
                    let emailContentHTML = emailHeadContent + separator + emailBodyContent;
                    emailContentHTML = emailContentHTML.replace(/\r?\n|\r/g, '<br>');
                    
                    try {
                        const blobHTML = new Blob([emailContentHTML], { type: 'text/html' });
                        
                        const tmpDiv = document.createElement('div');
                        tmpDiv.innerHTML = emailHeadContent + separator + emailBodyContent;
                        let blockText = tmpDiv.innerText;
                        blockText = blockText.replace(/^$/gm, ' ');
                        
                        const blobText = new Blob([blockText], { type: 'text/plain' });
                        const data = [new ClipboardItem({
                            'text/html': blobHTML,
                            'text/plain': blobText
                        })];

                        await navigator.clipboard.write(data);
                        window.showToast('メール文面をコピーしました！', 'success');
                    } catch (err) {
                        console.error('Failed to copy: ', err);
                        window.showToast('コピーに失敗しました。', 'error');
                    }
                });

                $scope.find('button[title="メール送信"]').off('click').on('click', function () {
                    const emailHead = $emailHead.val();
                    const emailBody = $emailBody.val();
                    const emailTo = $emailTo.val();
                    const emailCc = $emailCc.val();
                    const emailSubject = $emailSubject.val();

                    const separator = '\n\n========================================\n\n';
                    const emailContent = `${emailHead}${separator}${emailBody}`;
                    const emailUrl = `mailto:${emailTo}?cc=${emailCc}&subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailContent)}`;
                    window.open(emailUrl, '_blank');
                });
            })();
        </script>
    </div>
